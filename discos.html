<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Discos - Zamora Tech</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        
        :root { --naranja: #FF6600; --oscuro: #212529; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: white; margin: 0; padding: 20px; }
        .header-catalogo { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid var(--naranja); padding-bottom: 10px; margin-bottom: 30px; }
        .btn-volver { text-decoration: none; color: var(--oscuro); font-weight: bold; border: 1px solid #ccc; padding: 5px 15px; border-radius: 5px; }
        
        /* Estilos de Filtros */
        .filtros { display: flex; gap: 20px; background: var(--gris); padding: 15px; border-radius: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filtros select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; outline: none; cursor: pointer; }

        /* Grid de Productos */
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card-producto { border: 1px solid #eee; padding: 20px; border-radius: 10px; text-align: center; transition: 0.3s; background: white; }
        .card-producto:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); transform: translateY(-5px); }
        .precio { color: var(--naranja); font-weight: bold; font-size: 1.3rem; display: block; margin: 10px 0; }
        .btn-compra { background: #25D366; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; display: block; }
    
    </style>
</head>
<body>

    <div class="header-catalogo">
        <a href="index.html" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver</a>
        <h1>Catálogo de Discos</h1>
    </div>

    <div class="filtros">
        <div>
            <label>Marca:</label>
            <select id="filtroMarca">
                <option value="todos">Todas las Marcas</option>
                <option value="kingston">Kingston</option>
                <option value="crucial">Crucial</option>
                <option value="western">Western Digital</option>
            </select>
        </div>
        <div>
            <label>Capacidad:</label>
            <select id="filtroCapacidad">
                <option value="todos">Todas las Capacidades</option>
                <option value="240gb">240GB</option>
                <option value="480gb">480GB</option>
                <option value="1tb">1TB</option>
            </select>
        </div>
    </div>

    <div class="productos-grid" id="listaProductos">
        
        <div class="card-producto" data-marca="kingston" data-capacidad="480gb">
            <i class="fas fa-hdd fa-4x" style="color:#ddd"></i>
            <h3>SSD Kingston 480gb A400</h3>
            <p>SSD SATA 2.5"</p>
            <span class="precio">$100.00</span>
            <a href="https://wa.me/593960344187" class="btn-compra">Comprar</a>
        </div>

        <div class="card-producto" data-marca="crucial" data-capacidad="1tb">
            <i class="fas fa-microchip fa-4x" style="color:#ddd"></i>
            <h3>SSD M.2 Crucial 1tb P3</h3>
            <p>NVMe PCIe Gen3</p>
            <span class="precio">$200.00</span>
            <a href="https://wa.me/593960344187" class="btn-compra">Comprar</a>
        </div>

        <div class="card-producto" data-marca="kingston" data-capacidad="240gb">
            <i class="fas fa-hdd fa-4x" style="color:#ddd"></i>
            <h3>SSD Kingston 240gb A400</h3>
            <p>SSD SATA 2.5"</p>
            <span class="precio">$50.00</span>
            <a href="https://wa.me/593960344187" class="btn-compra">Comprar</a>
        </div>

    </div>

    <script>
        const filtroMarca = document.getElementById('filtroMarca');
        const filtroCapacidad = document.getElementById('filtroCapacidad');
        const productos = document.querySelectorAll('.card-producto');

        function aplicarFiltros() {
            const m = filtroMarca.value;
            const c = filtroCapacidad.value;

            productos.forEach(p => {
                const pMarca = p.getAttribute('data-marca');
                const pCapacidad = p.getAttribute('data-capacidad');

                const cumpleMarca = (m === 'todos' || m === pMarca);
                const cumpleCapacidad = (c === 'todos' || c === pCapacidad);

                if (cumpleMarca && cumpleCapacidad) {
                    p.style.display = 'block';
                } else {
                    p.style.display = 'none';
                }
            });
        }

        filtroMarca.addEventListener('change', aplicarFiltros);
        filtroCapacidad.addEventListener('change', aplicarFiltros);
  
    </script>
<a href="https://wa.me/593960344187?text=Hola Zamora Tech,%20necesito%20información%20sobre%20un%20servicio%20técnico." 
   class="whatsapp-float" 
   target="_blank">
    <i class="fab fa-whatsapp my-float"></i>
</a>
</body>
</html>
