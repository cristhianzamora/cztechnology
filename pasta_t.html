<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Pastas térmicas | Zamora Tech</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --naranja: #FF6600;
            --naranja-dark: #e65c00;
            --oscuro: #1a1a1a;
            --blanco: #ffffff;
            --gris-fondo: #f8f9fa;
            --sombra: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--gris-fondo); color: var(--oscuro); padding-bottom: 80px; }

        /* Header Premium */
        header {
            background: var(--blanco);
            padding: 15px 5%;
            box-shadow: var(--sombra);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-volver {
            text-decoration: none;
            color: var(--oscuro);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .logo-text { font-weight: 800; color: var(--naranja); font-size: 1.2rem; }

        /* Barra de Filtros Responsiva */
        .filter-section {
            background: var(--blanco);
            margin: 20px 5%;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--sombra);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.8rem; font-weight: 700; color: #555; text-transform: uppercase; }
        
        .filter-group select {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #eee;
            outline: none;
            background: #fff;
            font-weight: 500;
            cursor: pointer;
        }

        .filter-group select:focus { border-color: var(--naranja); }

        /* Grid de Productos */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            padding: 0 5%;
        }

        .product-card {
            background: var(--blanco);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s ease;
            border: 1px solid #efefef;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .icon-circle {
            background: #fff5ed;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: var(--naranja);
            font-size: 2rem;
        }

        .product-card h3 { font-size: 1rem; margin-bottom: 5px; font-weight: 700; }
        .product-card p { font-size: 0.8rem; color: #888; margin-bottom: 15px; }

        .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--oscuro);
            display: block;
            margin-bottom: 15px;
        }

        .btn-ws-card {
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-ws-card:hover { background: #128c7e; }

        /* Botón Flotante WhatsApp con Pulso */
        .ws-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 25px;
            right: 25px;
            background: #25d366;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            z-index: 2000;
            text-decoration: none;
            animation: pulse-ws 2s infinite;
        }

        @keyframes pulse-ws {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Responsive movil */
        @media (max-width: 480px) {
            .catalog-container { grid-template-columns: 1fr; }
            .filter-section { margin: 15px 5%; }
        }
        /* Etiqueta de Sin Stock */
.badge-no-stock {
    display: inline-block;
    background-color: #ffebee; /* Rojo muy claro (Soft Red) */
    color: #c62828;            /* Rojo oscuro para el texto */
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 15px;
    border: 1px solid #ffcdd2; /* Borde sutil para dar definición */
}

/* Opcional: Estilo para el botón cuando no hay stock */
.btn-ws-card.disabled {
    background-color: #ccc;
    pointer-events: none; /* Desactiva el clic si prefieres */
    filter: grayscale(1);
    opacity: 0.7;
    }
    /* Quita el subrayado y mantiene el color original del logo */
        .logo-link {
        text-decoration: none;
        transition: 0.3s;
        }

        /* Efecto opcional: que brille un poco al pasar el mouse */
        .logo-link:hover {
         opacity: 0.8;
        transform: scale(1.05); /* Un pequeño aumento de tamaño al tocarlo */
        }

/* --- ESTILO DEL PIE DE PÁGINA (FOOTER) --- */
footer {
    background: var(--blanco);
    padding: 30px 0;
    text-align: center;
    border-top: 1px solid #eee;
    margin-top: 50px;
    width: 100%;
}

.footer-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.footer-logo {
    font-weight: 800;
    color: var(--naranja);
    font-size: 1.1rem;
    letter-spacing: 1px;
}

.footer-rights {
    font-size: 0.8rem;
    color: #888;
}


    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-volver">
            <i class="fas fa-chevron-left"></i> VOLVER
      </a>
        <a href="index.html" class="logo-link">
        <div class="logo-text">ZAMORA TECH</div>
        </a>
    </header>

    <section class="filter-section">
        <div class="filter-group">
            <label>Marca</label>
            <select id="f-marca">
                <option value="todos">Todas</option>
                <option value="ARCTIC">ARCTIC</option>
                <option value="THERMALHER">THERMALHER</option>
                <option value="Thermal Grizzlyu">Thermal Grizzlyu</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Modelos</label>
            <select id="f-capa">
                <option value="todos">Todas</option>
                <option value="Kryonaut 5.5">Kryonaut 5.5</option>
                <option value="MX-4">MX-4</option>
                <option value="Artic Silver High">Artic Silver High</option>
            </select>
        </div>
    </section>

    <main class="catalog-container">
        <div class="product-card" data-marca="ARCTIC" data-modelo="Kryonaut 5.5">
            <div class="icon-circle"><i class="fas fa-hdd"></i></div>
            <h3>Kryonaut 5.5</h3>
            <p>Kryonaut 5.5</p>
            <span class="price">$45.00</span>
            <span class="badge-no-stock">Sin Stock</span>
            <a href="https://wa.me/593960344187?text=Hola Zamora Tech quiero Cotizar+Kryonaut" class="btn-ws-card" target="_blank">Pedir por WhatsApp</a>
        </div>
        <div class="product-card" data-marca="THERMALHER" data-modelo="MX-4">
            <div class="icon-circle"><i class="fas fa-hdd"></i></div>
            <h3>MX-4</h3>
            <p>MX-4</p>
            <span class="price">$50.00</span>
            <span class="badge-no-stock">Sin Stock</span>
            <a href="https://wa.me/593960344187?text=Hola Zamora Tech quiero Cotizar+MX-4" class="btn-ws-card" target="_blank">Pedir por WhatsApp</a>
        </div>

        <div class="product-card" data-marca="Thermal Grizzlyu" data-modelo="Artic Silver High">
            <div class="icon-circle"><i class="fas fa-bolt"></i></div>
            <h3>Artic Silver High</h3>
            <p>Artic Silver High</p>
            <span class="price">$60.00</span>
            <span class="badge-no-stock">Sin Stock</span>
            <a href="https://wa.me/593960344187?text=Hola Zamora Tech quiero Cotizar+Artic Silver High" class="btn-ws-card" target="_blank">Pedir por WhatsApp</a>
        </div>

    </main>

    <a href="https://wa.me/593960344187" class="ws-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const selectMarca = document.getElementById('f-marca');
            const selectCapa = document.getElementById('f-capa');
            const productos = document.querySelectorAll('.product-card');

            function ejecutarFiltro() {
                const m = selectMarca.value;
                const c = selectCapa.value;

                productos.forEach(card => {
                    const cMarca = card.getAttribute('data-marca');
                    const cCapa = card.getAttribute('data-modelo');

                    const matchMarca = (m === 'todos' || m === cMarca);
                    const matchCapa = (c === 'todos' || c === cCapa);

                    if (matchMarca && matchCapa) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }

            selectMarca.addEventListener('change', ejecutarFiltro);
            selectCapa.addEventListener('change', ejecutarFiltro);
        });
    </script>
<footer>
    <div class="footer-content">
        <div class="footer-logo">ZAMORA TECH</div>
        <p class="footer-rights">© 2026 Todos los derechos reservados.</p>
    </div>
</footer>
</body>
</html>
